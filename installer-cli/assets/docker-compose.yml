# Engrammic Self-Hosted - includes SAGE pipelines (~9GB RAM total)
# Installed by: engrammic docker
# For scaling guidance, run: engrammic scale
# To upgrade, run: engrammic upgrade

services:
  app:
    image: europe-north1-docker.pkg.dev/engrammic/releases/engrammic-api:latest
    container_name: engrammic-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount gcloud credentials for Vertex AI (optional)
      - ~/.config/gcloud:/mnt/gcloud:ro
      # Host-editable config overrides (e.g. models.yaml to switch the SAGE LLM).
      # Files dropped here win over the defaults baked into the image.
      - ./config:/app/config-override:ro
    environment:
      - ENVIRONMENT=self-hosted
      - ENGRAMMIC_CONFIG_DIR=/app/config-override
      - MEMGRAPH_HOST=memgraph
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=engrammic
      - POSTGRES_DATABASE=engrammic
      # GOOGLE_APPLICATION_CREDENTIALS is intentionally NOT set here.
      # This allows ADC to fall through to GCE metadata on cloud VMs.
      # LiteLLM Vertex AI env vars (mapped from .env)
      - VERTEXAI_PROJECT=${VERTEX_PROJECT:-}
      - VERTEXAI_LOCATION=${VERTEX_LOCATION:-}
      # Migrations run automatically on startup. Set to false to disable:
      # - RUN_MIGRATIONS=false
    depends_on:
      memgraph:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  reaction-worker:
    image: europe-north1-docker.pkg.dev/engrammic/releases/engrammic-api:latest
    container_name: engrammic-reaction-worker
    command: ["taskiq", "worker", "context_service.reactions.worker_entrypoint:broker", "--workers", "1"]
    env_file:
      - .env
    volumes:
      # Mount gcloud credentials for Vertex AI (optional)
      - ~/.config/gcloud:/mnt/gcloud:ro
      - ./config:/app/config-override:ro
    environment:
      - ENVIRONMENT=self-hosted
      - ENGRAMMIC_CONFIG_DIR=/app/config-override
      - MEMGRAPH_HOST=memgraph
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=engrammic
      - POSTGRES_DATABASE=engrammic
      # GOOGLE_APPLICATION_CREDENTIALS is intentionally NOT set here.
      # This allows ADC to fall through to GCE metadata on cloud VMs.
      - VERTEXAI_PROJECT=${VERTEX_PROJECT:-}
      - VERTEXAI_LOCATION=${VERTEX_LOCATION:-}
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  dagster:
    image: europe-north1-docker.pkg.dev/engrammic/releases/engrammic-dagster:latest
    container_name: engrammic-dagster
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-m", "context_service.pipelines.definitions"]
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./config:/app/config-override:ro
    environment:
      - ENVIRONMENT=self-hosted
      - ENGRAMMIC_CONFIG_DIR=/app/config-override
      - MEMGRAPH_HOST=memgraph
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=engrammic
      - POSTGRES_DATABASE=engrammic
    depends_on:
      memgraph:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/server_info')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  dagster-daemon:
    image: europe-north1-docker.pkg.dev/engrammic/releases/engrammic-dagster:latest
    container_name: engrammic-dagster-daemon
    command: ["dagster-daemon", "run"]
    env_file:
      - .env
    volumes:
      - ./config:/app/config-override:ro
    environment:
      - ENVIRONMENT=self-hosted
      - ENGRAMMIC_CONFIG_DIR=/app/config-override
      - DAGSTER_HOME=/app
      - MEMGRAPH_HOST=memgraph
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=engrammic
      - POSTGRES_DATABASE=engrammic
    depends_on:
      dagster:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  memgraph:
    image: memgraph/memgraph-mage:3.10.1
    container_name: engrammic-memgraph
    ports:
      - "7687:7687"
    volumes:
      - memgraph-data:/var/lib/memgraph
    command: ["--log-level=WARNING", "--storage-properties-on-edges=true"]
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: engrammic-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: engrammic-redis
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "100mb"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: engrammic-postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=engrammic
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-engrammic}
      - POSTGRES_DB=engrammic
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engrammic -d engrammic"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

volumes:
  memgraph-data:
  qdrant-data:
  redis-data:
  postgres-data:
