name: Deploy installer

on:
  push:
    branches:
      - main
    paths:
      - "installer/**"

jobs:
  deploy:
    name: Build and deploy get-engrammic
    runs-on: ubuntu-latest
    if: github.repository == 'engrammic-ai/mcp-client'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build image
        run: |
          gcloud builds submit --config cloudbuild.installer.yaml

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy engrammic-get \
            --image europe-north1-docker.pkg.dev/engrammic/engrammic/get-engrammic:latest \
            --region europe-north1 \
            --allow-unauthenticated \
            --port 8080
