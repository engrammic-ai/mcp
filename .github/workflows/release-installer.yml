name: Release Installer

on:
  push:
    tags:
      - 'installer-v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
  CC_aarch64_unknown_linux_musl: aarch64-linux-gnu-gcc

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: engrammic
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: engrammic
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: engrammic
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: engrammic
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: engrammic.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl toolchain
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          # For aarch64 cross-compilation
          if [[ "${{ matrix.target }}" == "aarch64"* ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu musl-dev
          fi

      - name: Build
        working-directory: installer-cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          src="installer-cli/target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          dst="engrammic-${{ matrix.target }}${{ matrix.target == 'x86_64-pc-windows-msvc' && '.exe' || '' }}"
          cp "$src" "$dst"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: engrammic-${{ matrix.target }}
          path: engrammic-${{ matrix.target }}*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          # Drop stale checksums first so a job re-run never hashes them.
          rm -f -- *.sha256
          for f in *; do
            [ -f "$f" ] || continue
            case "$f" in *.sha256) continue ;; esac
            sha256sum "$f" > "${f}.sha256"
          done
          ls -la *.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

