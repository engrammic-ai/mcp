name: Release Installer

on:
  push:
    tags:
      - 'installer-v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            os: ubuntu-latest
            artifact: engrammic-x86_64-unknown-linux-musl
          - goos: linux
            goarch: arm64
            os: ubuntu-latest
            artifact: engrammic-aarch64-unknown-linux-musl
          - goos: darwin
            goarch: amd64
            os: macos-latest
            artifact: engrammic-x86_64-apple-darwin
          - goos: darwin
            goarch: arm64
            os: macos-latest
            artifact: engrammic-aarch64-apple-darwin
          - goos: windows
            goarch: amd64
            os: windows-latest
            artifact: engrammic-x86_64-pc-windows-msvc.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: installer-go/go.sum

      - name: Build
        working-directory: installer-go
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -ldflags="-s -w" -o "../${{ matrix.artifact }}" ./cmd/engrammic

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          rm -f -- *.sha256
          for f in *; do
            [ -f "$f" ] || continue
            case "$f" in *.sha256) continue ;; esac
            sha256sum "$f" > "${f}.sha256"
          done
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
